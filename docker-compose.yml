version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sentinel-postgres
    restart: always
    environment:
      POSTGRES_USER: AfshanQ
      POSTGRES_PASSWORD: Afshan525
      POSTGRES_DB: sre_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
  rabbitmq:
    image: rabbitmq:3-management
    container_name: sentinel-rabbitmq
    restart: always
    ports:
      - "5672:5672"   
      - "15672:15672" 
  redis:
    image: redis:alpine
    container_name: sentinel-redis
    restart: always
    ports:
      - "16379:6379"
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data: